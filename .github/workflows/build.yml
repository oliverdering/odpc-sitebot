name: Build ODPC Index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install cheerio

      - name: Build index
        run: node scripts/build-index.mjs

      - name: Commit index
        run: |
          git config user.name "odpc-bot"
          git config user.email "bot@odpc.de"
          git add index.json
          git commit -m "update index" || echo "no changes"
          git push